version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      angular:
        patterns:
          - '@angular/*'
          - '@angular-eslint/*'
          - 'angular-eslint'
      nestjs:
        patterns:
          - '@nestjs/*'
    open-pull-requests-limit: 10

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
